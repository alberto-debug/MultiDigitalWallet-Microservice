services:

  postgres-user:
    image: postgres:17
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: "./MicroServices/userService"
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      postgres-user:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-user:5432/userdb
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_ISSUER: ${JWT_ISSUER}
      ADM_EMAIL: ${ADM_EMAIL}
      ADM_PASSWORD: ${ADM_PASSWORD}
      SPRING_DOCKER_COMPOSE_FILE: ../../docker-compose.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-wallet:
    image: postgres:17
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d walletdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet-service:
    build:
      context: "./MicroServices/walletService"
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      postgres-wallet:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-wallet:5432/walletdb
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DOCKER_COMPOSE_FILE: ../../docker-compose.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  vaadin-app:
    build:
      context: "./MicroServices/wallet"
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://user-service:8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_user_data:
  postgres_wallet_data: